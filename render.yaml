databases:
  - name: aethryadnd-db
    plan: free

services:
  - type: web
    name: aethryadnd-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: CLIENT_ORIGIN
        value: https://aethryadnd.online
      - key: DATABASE_URL
        fromDatabase:
          name: aethryadnd-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: aethryadnd-web
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.aethryadnd.online/api
      - key: VITE_SOCKET_URL
        value: https://api.aethryadnd.online
