name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      - name: Run server tests
        working-directory: server
        run: npm test
  client-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Run client tests
        working-directory: client
        run: npm test
      - name: Build client
        working-directory: client
        run: npm run build
